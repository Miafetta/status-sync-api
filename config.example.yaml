server:
  host: "0.0.0.0"
  port: 8000

auth:
  upload_token: "change-me"
  require_upload_token: true

storage:
  path: "data/status.json"

status:
  online_threshold_seconds: 1800
  private_values:
    - "none"
  max_raw_value_length: 20000
  output_timezone: "+08:00"

processing:
  device_aliases: {}
  network_aliases:
    NR: "5G"
    LTE: "4G"
    IWLAN: "Wi-Fi Calling"
    Unknown: null

geocode:
  enabled: true
  endpoint: "https://nominatim.openstreetmap.org/reverse"
  user_agent: "status-sync-api/0.1"
  language: "zh-CN"
  timeout_seconds: 5.0
  cache_ttl_seconds: 86400
  zoom: 12

cors:
  allow_origins:
    - "*"
  allow_methods:
    - "GET"
    - "POST"
    - "OPTIONS"
  allow_headers:
    - "*"
