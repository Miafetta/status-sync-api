auth:
  upload_token: "change-me"
  require_upload_token: true

cors:
  allow_origins:
    - "*"
  allow_methods:
    - "GET"
    - "POST"
    - "OPTIONS"
  allow_headers:
    - "*"

processing:
  device_aliases: {}
  network_aliases:
    NR: "5G"
    NR_SA: "5G"
    NR_NSA: "5G"
    LTE: "4G"
    IWLAN: "Wi-Fi Calling"
    Unknown: null

geocode:
  enabled: true
  provider: "amap"
  api_key: ""
  endpoint: "https://restapi.amap.com/v3/geocode/regeo"
  user_agent: "status-sync-api/0.1"
  language: "zh-CN"
  timeout_seconds: 5.0
  cache_ttl_seconds: 86400
  zoom: 12

routes:
  upload: "/upload"
  status: "/status"
  health: "/health"

status:
  output_timezone: "+08:00"
  online_threshold_seconds: 1800
  private_values:
    - "none"
  max_raw_value_length: 20000

storage:
  path: "data/status.json"

server:
  host: "0.0.0.0"
  port: 8000
